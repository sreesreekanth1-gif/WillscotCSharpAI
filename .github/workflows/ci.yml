name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Restore dependencies
        run: dotnet restore WillscotCSharpAI.sln

      - name: Build
        run: dotnet build WillscotCSharpAI.sln --no-restore

      - name: Install Playwright browsers
        run: pwsh bin/Debug/net8.0/playwright.ps1 install --with-deps

      - name: Create Reports directory
        run: New-Item -ItemType Directory -Force -Path Reports

      - name: Run tests
        env:
          BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
        run: dotnet test WillscotCSharpAI.sln --no-build --logger "trx;LogFileName=TestResults.trx" --results-directory TestResults

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: Reports/

      - name: Upload Test Results (TRX)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: TestResults/
